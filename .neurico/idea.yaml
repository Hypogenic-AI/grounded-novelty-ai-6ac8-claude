idea:
  title: Scientific Idea Generation with Grounded Novelty
  domain: artificial_intelligence
  hypothesis: 'Large language models can generate better scientific ideas when the
    notion of novelty is grounded through deduction, induction, proposal writing,
    outcome imagination, small experiments, or literature comparison, rather than
    relying on abstract or ungrounded prompts.

    '
  background:
    description: 'Recent papers have explored scientific idea generation with LLMs,
      but there is skepticism about their ability to produce good ideas. The challenge
      is that novelty is hard to define: LLMs are often criticized for generating
      either incremental or overly radical ideas. The hypothesis is that LLMs can
      better handle novelty when it is grounded, such as through deduction, induction,
      writing proposals, imagining outcomes, running small experiments, or comparing
      with existing literature.

      '
    papers:
    - description: '"Generating Literature-Driven Scientific Theories at Scale." https://arxiv.org/abs/2601.16282'
    - description: '"Heuristic-Based Ideation for Guiding LLMs Toward Structured Creativity."
        https://cichicago.substack.com/p/heuristic-based-ideation-for-guiding'
  metadata:
